<div class="cam-input {% if widget.attrs.class %}{{ widget.attrs.class }}{% endif %}" id="{{ widget.attrs.id }}">
  <input type="file" name="{{ widget.name }}" accept="image/webp" hidden />

  <div class="cam-input__preview-wrapper">
    {% block preview %}
    <img class="cam-input__preview-img"
         src="{% if widget.value %}{{ widget.value.url }}{% endif %}"
         alt="Current Image"
         {% if not widget.value %}hidden{% endif %} />
    {% endblock %}

    <button type="button" class="cam-input__trigger">
      {% block trigger_icon %}
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" class="cam-input__trigger-icon">
        <path fill="currentColor" d="M20 4h-3.17L15 2H9L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2m0 14H4V6h4.05l1.83-2h4.24l1.83 2H20zM12 7a5 5 0 0 0-5 5a5 5 0 0 0 5 5a5 5 0 0 0 5-5a5 5 0 0 0-5-5m0 8a3 3 0 0 1-3-3a3 3 0 0 1 3-3a3 3 0 0 1 3 3a3 3 0 0 1-3 3" />
      </svg>
      {% endblock %}
    </button>
  </div>
  <dialog class="cam-input__modal">
      <button type="button" class="cam-input__btn-close">
        {% block close_icon %}
        &times;
        {% endblock %}
      </button>

      <div class="cam-input__viewport">
        <video class="cam-input__video" autoplay playsinline></video>
        <canvas class="cam-input__canvas" hidden></canvas>
      </div>

      <div class="cam-input__controls">
        <button type="button" class="cam-input__btn-capture">
          {% block capture_icon %}
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path fill="currentColor" d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 0 0-5 5a5 5 0 0 0 5 5a5 5 0 0 0 5-5a5 5 0 0 0-5-5m0 2a3 3 0 0 1 3 3a3 3 0 0 1-3 3a3 3 0 0 1-3-3a3 3 0 0 1 3-3" />
          </svg>
          {% endblock %}
        </button>
        <button type="button" class="cam-input__btn-retry" hidden>
          {% block retry_icon %}
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path fill="currentColor" d="M11.896 18a.75.75 0 0 1-.75.75c-3.792 0-6.896-3.005-6.896-6.75s3.104-6.75 6.896-6.75c3.105 0 5.749 2.015 6.605 4.801l.603-1.02a.75.75 0 0 1 1.292.763l-1.63 2.755a.75.75 0 0 1-1.014.272L14.18 11.23a.75.75 0 1 1 .737-1.307l1.472.83c-.574-2.288-2.691-4.003-5.242-4.003C8.149 6.75 5.75 9.117 5.75 12s2.399 5.25 5.396 5.25a.75.75 0 0 1 .75.75" />
          </svg>
          {% endblock %}
        </button>
        <button type="button" class="cam-input__btn-confirm" hidden>
          {% block confirm_icon %}
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 2048 2048">
            <path fill="currentColor" d="m1902 196l121 120L683 1657L25 999l121-121l537 537z" />
          </svg>
          {% endblock %}
        </button>
      </div>
  </dialog>
</div>

{% block script %}
<script>
  {
    const root = document.getElementById("{{ widget.attrs.id }}");
    const trigger = root.querySelector(".cam-input__trigger");
    const previewImg = root.querySelector(".cam-input__preview-img");
    const fileInput = root.querySelector("input[type=file]");

    const modal = root.querySelector(".cam-input__modal");
    const video = root.querySelector(".cam-input__video");
    const canvas = root.querySelector(".cam-input__canvas");

    const btnCapture = root.querySelector(".cam-input__btn-capture");
    const btnRetry = root.querySelector(".cam-input__btn-retry");
    const btnConfirm = root.querySelector(".cam-input__btn-confirm");
    const btnClose = root.querySelector(".cam-input__btn-close");

    let stream = null;

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: {{ widget.capture_width }} },
            height: { ideal: {{ widget.capture_height }} }
          }
        });
        video.srcObject = stream;
        modal.showModal();
        setUIState("camera");
      } catch (err) {
        stopCamera();
      }
    }

    function stopCamera() {
      if (stream) stream.getTracks().forEach((t) => t.stop());
      video.srcObject = null;
      modal.close();
    }

    function setUIState(state) {
      const isCam = state === "camera";
      video.hidden = !isCam;
      canvas.hidden = isCam;
      btnCapture.hidden = !isCam;
      btnRetry.hidden = isCam;
      btnConfirm.hidden = isCam;
    }

    trigger.addEventListener("click", startCamera);

    btnClose.addEventListener("click", stopCamera);

    modal.addEventListener("cancel", () => {
      stopCamera();
    });

    btnCapture.addEventListener("click", () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      setUIState("review");
    });

    btnRetry.addEventListener("click", () => {
      setUIState("camera");
    });

    btnConfirm.addEventListener("click", () => {
      canvas.toBlob(
        (blob) => {
          const file = new File([blob], "capture.webp", {
            type: "image/webp",
          });

          const dt = new DataTransfer();
          dt.items.add(file);
          fileInput.files = dt.files;

          const url = URL.createObjectURL(file);
          previewImg.src = url;
          previewImg.hidden = false;
          previewImg.onload = () => URL.revokeObjectURL(url);

          stopCamera();
        },
        "image/webp",
        0.8
      );
    });
  }
</script>
{% endblock %}
